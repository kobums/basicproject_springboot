server:
  port: 8080

spring:
  application:
    name: basicproject_springboot
  # 비밀정보는 환경변수 또는 git에 올라가지 않는 application-local.yml 로 주입한다.
  config:
    import: optional:application-local.yml
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/project}
    username: ${DB_USERNAME:project}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  jpa:
    hibernate:
      ddl-auto: none            # 공유 DB: 스키마는 수동 관리. JPA가 테이블을 생성/변경/삭제하지 못하게 막음
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

# 업로드 파일 저장 디렉터리 (basicproject_springboot/uploads). /uploads/** 로 정적 서빙.
app:
  upload-dir: uploads
  jwt:
    # HS256 서명용 비밀키. 최소 32바이트 이상이어야 한다. 실서비스에서는 환경변수(JWT_SECRET)로 주입할 것.
    secret: ${JWT_SECRET:basicproject-dev-secret-key-please-change-in-production-0123456789}
    # 토큰 만료 시간 (밀리초). 기본 1일.
    expiration-ms: 86400000
